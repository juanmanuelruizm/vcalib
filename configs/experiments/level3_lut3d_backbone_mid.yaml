name: level3_lut3d_backbone_mid
dataset: data/datasets/level_1_vs_level_3
input_size: 384
filter:
  type: lut_3d
  size: 9
layer_group:
  name: backbone.mid
  layers:
  - backbone.layer.4
  - backbone.layer.5
  - backbone.layer.6
  - backbone.layer.7
training:
  max_epochs: 50
  learning_rate: 0.005
  reg_weight: 0.01
  early_stopping_patience: 10
  seed: 42
  checkpoint_every: 10
output:
  results_dir: results/experiments
