name: level3_neural_pixel_backbone_all
dataset: data/datasets/level_1_vs_level_3
input_size: 384
filter:
  type: neural_pixel
  hidden_dim: 32
  depth: 2
layer_group:
  name: backbone.all
  layers:
  - backbone.layer.0
  - backbone.layer.1
  - backbone.layer.2
  - backbone.layer.3
  - backbone.layer.4
  - backbone.layer.5
  - backbone.layer.6
  - backbone.layer.7
  - backbone.layer.8
  - backbone.layer.9
  - backbone.layer.10
  - backbone.layer.11
training:
  max_epochs: 100
  learning_rate: 0.001
  reg_weight: 0.001
  early_stopping_patience: 10
  seed: 42
  checkpoint_every: 10
output:
  results_dir: results/experiments
