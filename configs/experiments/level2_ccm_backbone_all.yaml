name: level2_ccm_backbone_all
dataset: data/datasets/level_1_vs_level_2
input_size: 384
filter:
  type: ccm_high_order
layer_group:
  name: backbone.all
  layers:
  - backbone.layer.0
  - backbone.layer.1
  - backbone.layer.2
  - backbone.layer.3
  - backbone.layer.4
  - backbone.layer.5
  - backbone.layer.6
  - backbone.layer.7
  - backbone.layer.8
  - backbone.layer.9
  - backbone.layer.10
  - backbone.layer.11
training:
  max_epochs: 50
  learning_rate: 0.005
  reg_weight: 0.01
  early_stopping_patience: 10
  seed: 42
  checkpoint_every: 10
output:
  results_dir: results/experiments
