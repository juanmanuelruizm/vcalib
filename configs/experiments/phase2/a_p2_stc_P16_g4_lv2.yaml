name: p2_stc_P16_g4_lv2
dataset: data/datasets/level_1_vs_level_2
input_size: 384
filter:
  type: spatial_tone_curve
  P: 16
  grid_size: 4
layer_group:
  name: phase2_group
  layers:
  - backbone.projector
training:
  max_epochs: 50
  learning_rate: 0.005
  reg_weight: 0.01
  early_stopping_patience: 10
  seed: 42
  checkpoint_every: 10
output:
  results_dir: results/experiments
