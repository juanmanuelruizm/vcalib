name: level2_neural_pixel_backbone_mid
dataset: data/datasets/level_1_vs_level_2
input_size: 384
filter:
  type: neural_pixel
  hidden_dim: 32
  depth: 2
layer_group:
  name: backbone.mid
  layers:
  - backbone.layer.4
  - backbone.layer.5
  - backbone.layer.6
  - backbone.layer.7
training:
  max_epochs: 100
  learning_rate: 0.001
  reg_weight: 0.001
  early_stopping_patience: 10
  seed: 42
  checkpoint_every: 10
output:
  results_dir: results/experiments
