name: level2_composite_affine_gamma_backbone_mid_v2
dataset: data/datasets/level_1_vs_level_2
input_size: 384
filter:
  composite:
  - affine_6param
  - gamma_3param
layer_group:
  name: backbone.mid
  layers:
  - backbone.layer.4
  - backbone.layer.5
  - backbone.layer.6
  - backbone.layer.7
training:
  max_epochs: 80
  learning_rate: 0.001
  reg_weight: 0.005
  early_stopping_patience: 15
  seed: 42
  checkpoint_every: 10
  scheduler: cosine
  scheduler_kwargs:
    T_max: 80
    eta_min: 1.0e-06
output:
  results_dir: results/experiments
