name: level3_matrix_backbone_late
dataset: data/datasets/level_1_vs_level_3
input_size: 384
filter:
  type: matrix_12param
layer_group:
  name: backbone.late
  layers:
  - backbone.layer.8
  - backbone.layer.9
  - backbone.layer.10
  - backbone.layer.11
training:
  max_epochs: 50
  learning_rate: 0.005
  reg_weight: 0.01
  early_stopping_patience: 10
  seed: 42
  checkpoint_every: 10
output:
  results_dir: results/experiments
